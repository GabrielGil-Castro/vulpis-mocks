<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leidi Galvão | Corretora de Imóveis em Barra Mansa</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F5F0E8;
  --dark: #2C2C2C;
  --accent: #B8943A;
  --accent-light: #D4AE5A;
  --white: #FFFFFF;
  --gray: #6B6B6B;
  --gray-light: #E8E2D6;
  --radius-btn: 12px;
  --radius-card: 10px;
  --radius-input: 8px;
  --shadow: 0 4px 24px rgba(44,44,44,0.10);
  --shadow-hover: 0 8px 36px rgba(44,44,44,0.18);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background-color: var(--bg);
  color: var(--dark);
  line-height: 1.6;
  overflow-x: hidden;
}

h1, h2, h3 {
  font-family: 'Playfair Display', serif;
}

/* ===== NAV ===== */
nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: rgba(245, 240, 232, 0.96);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--gray-light);
  padding: 0 5%;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.nav-logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--dark);
  line-height: 1.2;
  text-decoration: none;
}

.nav-logo span {
  display: block;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.65rem;
  font-weight: 400;
  color: var(--accent);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 2rem;
  list-style: none;
}

.nav-links a {
  text-decoration: none;
  color: var(--dark);
  font-size: 0.9rem;
  font-weight: 500;
  transition: color 0.3s;
}

.nav-links a:hover { color: var(--accent); }

.nav-cta {
  background: var(--accent);
  color: var(--white) !important;
  padding: 0.5rem 1.3rem;
  border-radius: var(--radius-btn);
  font-weight: 600 !important;
  transition: background 0.3s, transform 0.2s !important;
}

.nav-cta:hover {
  background: var(--accent-light) !important;
  color: var(--white) !important;
  transform: translateY(-1px);
}

.nav-hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 4px;
}

.nav-hamburger span {
  display: block;
  width: 24px;
  height: 2px;
  background: var(--dark);
  border-radius: 2px;
  transition: all 0.3s;
}

/* ===== HERO ===== */
#hero {
  min-height: 100vh;
  padding: 120px 5% 80px;
  display: flex;
  align-items: center;
  position: relative;
  overflow: hidden;
}

.hero-bg-shape {
  position: absolute;
  top: -80px;
  right: -120px;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(184,148,58,0.13) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

.hero-bg-shape2 {
  position: absolute;
  bottom: -100px;
  left: -80px;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(184,148,58,0.08) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

.hero-inner {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4rem;
  align-items: center;
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
}

.hero-content {
  animation: fadeUp 0.9s ease forwards;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  background: rgba(184,148,58,0.12);
  color: var(--accent);
  border: 1px solid rgba(184,148,58,0.3);
  padding: 0.35rem 1rem;
  border-radius: 50px;
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 1.5rem;
}

.hero-badge::before {
  content: '';
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
}

.hero-title {
  font-size: clamp(2.2rem, 5vw, 3.5rem);
  font-weight: 800;
  color: var(--dark);
  line-height: 1.15;
  margin-bottom: 1.2rem;
}

.hero-title em {
  color: var(--accent);
  font-style: normal;
}

.hero-subtitle {
  font-size: 1.05rem;
  color: var(--gray);
  margin-bottom: 2rem;
  max-width: 480px;
  line-height: 1.7;
}

.hero-btns {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  margin-bottom: 3rem;
}

.btn-primary {
  background: var(--accent);
  color: var(--white);
  padding: 0.85rem 2rem;
  border-radius: var(--radius-btn);
  font-weight: 600;
  font-size: 0.95rem;
  text-decoration: none;
  transition: all 0.3s;
  border: 2px solid var(--accent);
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
}

.btn-primary:hover {
  background: var(--accent-light);
  border-color: var(--accent-light);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(184,148,58,0.35);
}

.btn-secondary {
  background: transparent;
  color: var(--dark);
  padding: 0.85rem 2rem;
  border-radius: var(--radius-btn);
  font-weight: 600;
  font-size: 0.95rem;
  text-decoration: none;
  transition: all 0.3s;
  border: 2px solid var(--dark);
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
}

.btn-secondary:hover {
  background: var(--dark);
  color: var(--white);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  gap: 2rem;
  flex-wrap: wrap;
}

.stat-item {
  text-align: left;
}

.stat-number {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
}

.stat-label {
  font-size: 0.78rem;
  color: var(--gray);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 0.2rem;
}

.hero-visual {
  display: flex;
  justify-content: center;
  align-items: center;
  animation: fadeUp 1.1s ease 0.2s both;
}

.hero-card-wrapper {
  position: relative;
  width: 100%;
  max-width: 420px;
}

.hero-main-card {
  background: var(--white);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: var(--shadow-hover);
  position: relative;
}

.hero-img-placeholder {
  width: 100%;
  height: 300px;
  background: linear-gradient(135deg, #E8DFC8 0%, #D4C9A8 50%, #C8B87E 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  position: relative;
  overflow: hidden;
}

.house-svg {
  opacity: 0.5;
}

.hero-img-placeholder::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 80px;
  background: linear-gradient(to top, rgba(255,255,255,0.8), transparent);
}

.hero-card-info {
  padding: 1.5rem;
}

.hero-card-info h3 {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  color: var(--dark);
  margin-bottom: 0.3rem;
}

.hero-card-info p {
  font-size: 0.85rem;
  color: var(--gray);
  display: flex;
  align-items: center;
  gap: 0.4rem;
}

.hero-card-price {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--accent);
  margin-top: 0.5rem;
}

.floating-badge {
  position: absolute;
  top: -15px;
  right: 20px;
  background: var(--accent);
  color: var(--white);
  padding: 0.6rem 1.2rem;
  border-radius: 50px;
  font-size: 0.8rem;
  font-weight: 600;
  box-shadow: 0 4px 16px rgba(184,148,58,0.4);
}

.floating-card-small {
  position: absolute;
  bottom: -20px;
  left: -20px;
  background: var(--white);
  border-radius: var(--radius-card);
  padding: 1rem 1.2rem;
  box-shadow: var(--shadow-hover);
  display: flex;
  align-items: center;
  gap: 0.8rem;
  min-width: 180px;
}

.floating-card-small .icon {
  width: 40px;
  height: 40px;
  background: rgba(184,148,58,0.12);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--accent);
  font-size: 1.2rem;
  flex-shrink: 0;
}

.floating-card-small .text strong {
  display: block;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--dark);
}

.floating-card-small .text span {
  font-size: 0.72rem;
  color: var(--gray);
}

/* ===== SECTION BASE ===== */
section {
  padding: 90px 5%;
}

.section-label {
  display: inline-block;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 0.8rem;
}

.section-title {
  font-size: clamp(1.8rem, 3.5vw, 2.6rem);
  font-weight: 700;
  color: var(--dark);
  line-height: 1.2;
  margin-bottom: 1rem;
}

.section-subtitle {
  font-size: 1rem;
  color: var(--gray);
  max-width: 560px;
  line-height: 1.7;
}

.section-header {
  margin-bottom: 3.5rem;
}

/* ===== SERVIÇOS ===== */
#servicos {
  background: var(--white);
}

.servicos-inner {
  max-width: 1200px;
  margin: 0 auto;
}

.servicos-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.8rem;
}

.servico-card {
  background: var(--bg);
  border-radius: var(--radius-card);
  padding: 2.2rem 2rem;
  border: 1px solid var(--gray-light);
  transition: all 0.35s;
  position: relative;
  overflow: hidden;
}

.servico-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--accent);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.35s;
}

.servico-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-hover);
  border-color: rgba(184,148,58,0.2);
}

.servico-card:hover::before {
  transform: scaleX(1);
}

.servico-icon {
  width: 60px;
  height: 60px;
  background: rgba(184,148,58,0.12);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 1.5rem;
}

.servico-card h3 {
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 0.8rem;
}

.servico-card p {
  font-size: 0.92rem;
  color: var(--gray);
  line-height: 1.7;
  margin-bottom: 1.5rem;
}

.servico-link {
  color: var(--accent);
  font-weight: 600;
  font-size: 0.88rem;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  transition: gap 0.3s;
}

.servico-link:hover { gap: 0.7rem; }

/* ===== SOBRE ===== */
#sobre {
  background: var(--bg);
}

.sobre-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5rem;
  align-items: center;
}

.sobre-visual {
  position: relative;
}

.sobre-img-placeholder {
  width: 100%;
  aspect-ratio: 3/4;
  max-height: 500px;
  background: linear-gradient(145deg, #E8DFC8 0%, #D4C9A8 40%, #C4B070 100%);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-hover);
}

.sobre-img-placeholder::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent 50%, rgba(44,44,44,0.3) 100%);
}

.sobre-initials {
  width: 100px;
  height: 100px;
  background: rgba(255,255,255,0.2);
  border: 3px solid rgba(255,255,255,0.4);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Playfair Display', serif;
  font-size: 2.5rem;
  font-weight: 700;
  color: rgba(255,255,255,0.8);
}

.sobre-badge-creci {
  position: absolute;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--white);
  padding: 0.8rem 1.5rem;
  border-radius: 50px;
  font-weight: 600;
  font-size: 0.82rem;
  color: var(--dark);
  white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.sobre-badge-creci::before {
  content: '✓';
  width: 22px;
  height: 22px;
  background: var(--accent);
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  font-weight: 700;
  flex-shrink: 0;
}

.sobre-content {}

.sobre-content p {
  font-size: 1rem;
  color: var(--gray);
  line-height: 1.8;
  margin-bottom: 1.2rem;
}

.sobre-content p strong {
  color: var(--dark);
}

.sobre-features {
  display: flex;
  flex-direction: column;
  gap: 0.9rem;
  margin: 2rem 0;
}

.sobre-feature {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  font-size: 0.92rem;
  color: var(--dark);
  font-weight: 500;
}

.sobre-feature .check {
  width: 24px;
  height: 24px;
  background: rgba(184,148,58,0.12);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--accent);
  font-size: 0.75rem;
  flex-shrink: 0;
}

.sobre-instagram {
  display: inline-flex;
  align-items: center;
  gap: 0.6rem;
  color: var(--accent);
  font-weight: 600;
  font-size: 0.9rem;
  text-decoration: none;
  transition: opacity 0.3s;
}

.sobre-instagram:hover { opacity: 0.75; }

/* ===== CONTATO ===== */
#contato {
  background: var(--white);
}

.contato-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5rem;
  align-items: start;
}

.contato-info-items {
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
  margin-top: 2rem;
}

.contato-info-item {
  display: flex;
  align-items: flex-start;
  gap: 1rem;
}

.contato-icon {
  width: 48px;
  height: 48px;
  background: rgba(184,148,58,0.12);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.contato-info-item h4 {
  font-size: 0.82rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--accent);
  font-weight: 700;
  margin-bottom: 0.3rem;
}

.contato-info-item p, .contato-info-item a {
  font-size: 0.95rem;
  color: var(--dark);
  text-decoration: none;
  line-height: 1.5;
  font-weight: 500;
  transition: color 0.3s;
}

.contato-info-item a:hover { color: var(--accent); }

.contato-form {
  background: var(--bg);
  border-radius: 16px;
  padding: 2.5rem;
  border: 1px solid var(--gray-light);
}

.contato-form h3 {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 0.5rem;
}

.contato-form > p {
  font-size: 0.88rem;
  color: var(--gray);
  margin-bottom: 1.8rem;
}

.form-group {
  margin-bottom: 1.2rem;
}

.form-group label {
  display: block;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--dark);
  margin-bottom: 0.4rem;
  letter-spacing: 0.3px;
}

.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 0.8rem 1rem;
  background: var(--white);
  border: 1.5px solid var(--gray-light);
  border-radius: var(--radius-input);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.92rem;
  color: var(--dark);
  transition: border-color 0.3s;
  outline: none;
  appearance: none;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(184,148,58,0.1);
}

.form-group input::placeholder,
.form-group textarea::placeholder {
  color: #B0A89A;
}

.form-group textarea {
  height: 110px;
  resize: none;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}

.btn-form {
  width: 100%;
  padding: 0.95rem;
  background: var(--accent);
  color: var(--white);
  border: none;
  border-radius: var(--radius-btn);
  font-family: 'DM Sans', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 0.5rem;
}

.btn-form:hover {
  background: var(--accent-light);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(184,148,58,0.35);
}

/* ===== FOOTER ===== */
footer {
  background: var(--dark);
  color: var(--white);
  padding: 3rem 5%;
  text-align: center;
}

.footer-inner {
  max-width: 1000px;
  margin: 0 auto;
}

.footer-logo {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 0.3rem;
}

.footer-logo span {
  display: block;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.65rem;
  font-weight: 400;
  color: var(--accent);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-top: 0.2rem;
}

.footer-divider {
  width: 40px;
  height: 2px;
  background: var(--accent);
  margin: 1.5rem auto;
}

.footer-links {
  display: flex;
  justify-content: center;
  gap: 2rem;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
  list-style: none;
}

.footer-links a {
  color: rgba(255,255,255,0.6);
  text-decoration: none;
  font-size: 0.88rem;
  transition: color 0.3s;
}

.footer-links a:hover { color: var(--accent); }

.footer-bottom {
  border-top: 1px solid rgba(255,255,255,0.1);
  padding-top: 1.5rem;
  margin-top: 1.5rem;
  font-size: 0.8rem;
  color: rgba(255,255,255,0.4);
}

.footer-bottom a {
  color: var(--accent);
  text-decoration: none;
}

/* ===== WHATSAPP FLOAT ===== */
.whatsapp-float {
  position: fixed;
  bottom: 28px;
  right: 28px;
  z-index: 999;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 0.8rem;
}

.whatsapp-float a {
  width: 60px;
  height: 60px;
  background: #25D366;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 20px rgba(37,211,102,0.5);
  animation: pulse 2.5s infinite;
  transition: transform 0.3s;
}

.whatsapp-float a:hover {
  transform: scale(1.1);
  animation: none;
}

.whatsapp-tooltip {
  background: var(--dark);
  color: var(--white);
  font-size: 0.78rem;
  font-weight: 600;
  padding: 0.4rem 0.9rem;
  border-radius: 50px;
  white-space: nowrap;
  opacity: 0;
  transform: translateX(10px);
  transition: all 0.3s;
  pointer-events: none;
}

.whatsapp-float:hover .whatsapp-tooltip {
  opacity: 1;
  transform: translateX(0);
}

/* ===== ANIMAÇÕES ===== */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 4px 20px rgba(37,211,102,0.5); }
  50% { box-shadow: 0 4px 40px rgba(37,211,102,0.8), 0 0 0 12px rgba(37,211,102,0.1); }
}

/* ===== RESPONSIVO ===== */
@media (max-width: 960px) {
  .hero-inner {
    grid-template-columns: 1fr;
    gap: 3rem;
  }
  .hero-visual { order: -1; }
  .hero-card-wrapper { max-width: 360px; }
